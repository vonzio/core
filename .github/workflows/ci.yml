name: ci

# Validate every PR + every push to main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel older runs of the same PR when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm install
      - run: npx tsc --project packages/shared/tsconfig.json --noEmit
      - run: npx tsc --project packages/core-server/tsconfig.json --noEmit
      - run: npx tsc --project packages/dashboard/tsconfig.json --noEmit

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: vonzio_test
          POSTGRES_USER: vonzio
          POSTGRES_PASSWORD: vonzio_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vonzio"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      # createTestDB() reads TEST_DATABASE_URL (NOT DATABASE_URL — that's
      # for the server's own runtime). Non-DB tests don't care.
      TEST_DATABASE_URL: postgres://vonzio:vonzio_test@localhost:5432/vonzio_test
      ENCRYPTION_KEY: ci-test-encryption-key-32chars-xx
      BETTER_AUTH_SECRET: ci-test-better-auth-secret-32-chars
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm install
      - name: Run unit tests (DB-independent)
        # v0.1.0 limitation: createTestDB() in db/test-utils.ts does
        # DROP SCHEMA public CASCADE before running vonzio's Drizzle
        # migrations, which wipes the Better Auth tables (user, session,
        # account, verification) that migration 9 needs to ALTER. The
        # OSS install solved this by running Better Auth migrate in the
        # server container's startup wrapper; tests bypass that path.
        #
        # Proper fix: bootstrap Better Auth + Drizzle ONCE per CI run,
        # then have tests TRUNCATE data tables instead of dropping the
        # schema. Tracked as a v0.2 follow-up.
        #
        # For now CI runs the DB-independent unit tests, which is the
        # subset that's stable. Local dev runs the full suite against
        # a hand-managed postgres + better-auth-migrate.
        run: |
          npx vitest run \
            packages/shared \
            packages/core-server/src/orchestrator/retry.test.ts \
            packages/core-server/src/queue/queue.test.ts \
            packages/core-server/src/services/format-message.test.ts \
            packages/core-server/src/services/scope.test.ts

  image-build-and-scan:
    # Builds the agent-base + server images on every PR and scans both
    # with Trivy. Unified via matrix so the build/scan recipe lives in
    # one place; cache scopes are explicit per-image to keep the GHA
    # cache namespaces clean. Catches three classes of regression:
    # 1. Dockerfile breakage before it hits end-user installs (PR #66
    #    npm-ci lockfile bug would have surfaced here).
    # 2. CVEs in OS layer or bundled CLIs (git, gh, jq, chromium, etc.).
    # 3. CVEs introduced by new app dependencies.
    name: image build+scan (${{ matrix.image.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      # Run both even if one fails -- we want to see all findings.
      fail-fast: false
      matrix:
        image:
          - name: agent-base
            file: docker/Dockerfile.agent.base
            tag: ghcr.io/vonzio/vonzio/agent-base:ci
          - name: server
            file: docker/Dockerfile.server
            tag: vonzio-server:ci
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.image.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.file }}
          push: false
          load: true
          tags: ${{ matrix.image.tag }}
          # Per-image cache scope: prevents cross-image cache thrash
          # and keeps any future buildx job (release, etc.) from
          # clobbering either entry by accident.
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,scope=${{ matrix.image.name }},mode=max
      - name: Scan ${{ matrix.image.name }} with Trivy
        # Blocking gate as of v0.2: fails the job on any HIGH/CRITICAL
        # fixable CVE in OS or library layers. The Dockerfiles run
        # apt-get upgrade + npm install -g npm@latest on every rebuild
        # and the server image prunes devDeps (+ surgical delete of
        # extraneous esbuild orphans) to keep the baseline clean.
        # When a new HIGH/CRITICAL surfaces:
        #  - apt-side: usually clears on the next rebuild (apt-get
        #    upgrade pulls the latest debian-security patch)
        #  - npm-side: bump the offending dep's range in package.json
        #    until npm install resolves to a patched version
        #  - binary inside an npm package (esbuild, etc.): inspect with
        #    `npm explain`, decide whether to delete post-prune or
        #    bump the package that ships it
        # ignore-unfixed avoids failing on CVEs with no patch available
        # -- we can't act on those at PR time.
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ matrix.image.tag }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          # cache: true reuses the trivy vuln DB across the two
          # matrix legs and across runs -- saves ~700 MB download per leg.
          cache: true

  secret-scan:
    # Scan PR diffs for accidentally-committed secrets (API keys,
    # private keys, tokens). Catches the foot-gun of pasting a working
    # secret into a comment, test fixture, or example .env.
    #
    # Using TruffleHog instead of gitleaks-action -- gitleaks-action@v2
    # requires a paid license for GitHub orgs (vonzio is an org).
    # TruffleHog stays Apache-2.0 and free for any account type, and
    # verifies credentials against the source provider where possible
    # to cut false positives.
    name: secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Pull requests only -- a push-to-main scan would just confirm
    # what we already merged. Branch protection prevents direct pushes
    # to main, so any secret has to flow through a PR scanned here.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@v3.81.10
        with:
          # Scan only the PR diff (base..head) -- a full-history scan
          # on every PR would be wasteful and produce repeated noise
          # for any pre-existing match.
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          # `verified,unknown` rather than `--only-verified`:
          # - verified  = credential the provider confirmed live
          # - unknown   = credential TruffleHog matched a high-confidence
          #               pattern for but has no verifier endpoint
          #               (SSH/PGP private keys, generic JWTs, custom
          #               service tokens, .env API keys for self-hosted
          #               services). This is the class --only-verified
          #               would silently miss -- exactly the foot-gun
          #               the SECURITY_MODEL.md bullet promises to catch.
          # Drops `unverified` (long-tail high-entropy false positives).
          extra_args: --results=verified,unknown

  install-script-shellcheck:
    # Lint install.sh so we catch shell footguns before community users hit
    # them. shellcheck is the standard for bash quality.
    name: install.sh shellcheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning
          scandir: "./"
          additional_files: "install.sh scripts/start-dev.sh"
