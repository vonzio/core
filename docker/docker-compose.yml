services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=vonzio
      - POSTGRES_USER=vonzio
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-vonzio_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - vonzio
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vonzio"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - vonzio-data:/app/data
      - ../tools:/app/tools
      - ../config:/app/config
    ports:
      # API + dashboard preview proxy reachable directly on the host. In
      # OSS dev/local self-host this is the user-visible endpoint. Prod
      # deployments using docker-compose.prod.yml add Traefik on top for
      # real-domain HTTPS termination.
      - "${SERVER_PORT:-3000}:3000"
    environment:
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-change-this-to-a-secure-32-char-key!}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-change-this-to-a-secure-32-char-secret!}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://localhost:3000}
      - REGISTRATION_ENABLED=${REGISTRATION_ENABLED:-false}
      - DATABASE_URL=postgres://vonzio:${POSTGRES_PASSWORD:-vonzio_dev}@postgres:5432/vonzio
      - DOCKER_SOCKET=/var/run/docker.sock
      - AGENT_IMAGE=vonzio-agent:latest
      - DOCKER_ENABLED=true
      - DOCKER_NETWORK=vonzio-network
      - LOG_LEVEL=info
      - PORT=3000
      - HOST=0.0.0.0
      - POOL_MIN_SIZE=2
      - POOL_MAX_SIZE=5
      - SESSION_IDLE_TTL_SECS=1800
      - MAX_SESSION_CONTAINERS=10
      # Path-mode preview: agent dev servers are reachable through the
      # server's /preview/{container_id}/{port}/ route. No wildcard DNS
      # or reverse proxy required — works on stock localhost.
      - PREVIEW_MODE=path
      - PREVIEW_URL_TEMPLATE=http://localhost:3000/preview/{container_id}/{port}/
    depends_on:
      agent:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - vonzio

  agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent
    image: vonzio-agent:latest
    entrypoint: ["echo", "Agent image built"]
    networks:
      - vonzio

  # Flavored agent images (build individually with: docker compose build agent-go)
  agent-go:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent.go
    image: vonzio-agent:go
    entrypoint: ["echo", "Go agent image built"]
    depends_on:
      agent:
        condition: service_completed_successfully
    profiles: ["flavors"]

  agent-rust:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent.rust
    image: vonzio-agent:rust
    entrypoint: ["echo", "Rust agent image built"]
    depends_on:
      agent:
        condition: service_completed_successfully
    profiles: ["flavors"]

  agent-python-data:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent.python-data
    image: vonzio-agent:python-data
    entrypoint: ["echo", "Python data agent image built"]
    depends_on:
      agent:
        condition: service_completed_successfully
    profiles: ["flavors"]

  agent-java:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent.java
    image: vonzio-agent:java
    entrypoint: ["echo", "Java agent image built"]
    depends_on:
      agent:
        condition: service_completed_successfully
    profiles: ["flavors"]

networks:
  vonzio:
    name: vonzio-network

volumes:
  vonzio-data:
  pgdata:
